<html lang="ja">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<body>
<div id="root"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                                  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, serverTimestamp }
                                                  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ══════════════════════════════════════════════════════
// 🔧 Firebase設定
// ══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyB3smRm_OnFMLpWOUNQT9KIpddkogWnfNE",
  authDomain:        "travel-planner-775f3.firebaseapp.com",
  projectId:         "travel-planner-775f3",
  storageBucket:     "travel-planner-775f3.firebasestorage.app",
  messagingSenderId: "605872979305",
  appId:             "1:605872979305:web:d3f37b4885877912f691f8",
};
// ══════════════════════════════════════════════════════

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();

// ─── データ定義 ───────────────────────────────────────
const COLORS  = ["#4A90D9","#7B68EE","#E07B54","#E8A838","#5BAD8F","#D95B8A","#4ABFB0","#9B7FD4","#C0784A","#6B9E3A"];
const MEMBERS = [
  { id: "naoki", label: "naoki", color: "#4A90D9" },
  { id: "yumi",  label: "yumi",  color: "#7B68EE" },
];
const defaultCategories = () => ({
  todo: [
    { id: "transport",     label: "交通",           color: "#4A90D9" },
    { id: "accommodation", label: "宿泊",           color: "#7B68EE" },
    { id: "activity",      label: "アクティビティ", color: "#E07B54" },
    { id: "food",          label: "グルメ",         color: "#E8A838" },
    { id: "other",         label: "その他",         color: "#5BAD8F" },
  ],
  item: [
    { id: "clothes",     label: "衣類",     color: "#4A90D9" },
    { id: "toiletry",    label: "洗面用具", color: "#7B68EE" },
    { id: "electronics", label: "電子機器", color: "#E07B54" },
    { id: "document",    label: "書類",     color: "#E8A838" },
    { id: "medicine",    label: "医薬品",   color: "#5BAD8F" },
    { id: "other",       label: "その他",   color: "#888"    },
  ],
});
let _uid = Date.now();
const uid = () => `id_${_uid++}`;
const fmtDate = (d) => {
  if (!d) return "";
  const [y,m,day] = d.split("-");
  return `${y}年${parseInt(m)}月${parseInt(day)}日`;
};

// ─── Firestore ───────────────────────────────────────
const saveTrip   = (trip) => setDoc(doc(db,"trips",trip.id), {...trip, updatedAt: serverTimestamp()});
const deleteTrip = (id)   => deleteDoc(doc(db,"trips",id));

// ─── 状態管理 ─────────────────────────────────────────
let state = {
  authReady: false,
  user: null,
  authError: "",
  trips: [],
  selectedId: null,
  // TripDetail用
  detail: {
    tab: "todo",
    showForm: false,
    showCatMgr: false,
    showTripEdit: false,
    tripName: "",
    dateFrom: "",
    dateTo: "",
    newCatLabel: "",
    filterMember: "all_members",
    filterCat: "all",
    filterOwnership: "all",
    newData: { text:"", category:"", member:"naoki", note:"", qty:1, ownership:"owned" },
    editId: null,
    itemMode: "new",
    existingSearch: "",
    existingSelected: null,
    saving: false,
  },
  // TripList用
  list: {
    showForm: false,
    form: { name:"", dateFrom:"", dateTo:"", copyFrom:"" },
  },
};

const setState = (patch) => {
  for (const k in patch) {
    if (patch[k] && typeof patch[k] === "object" && !Array.isArray(patch[k]) && state[k] && typeof state[k] === "object") {
      state[k] = {...state[k], ...patch[k]};
    } else {
      state[k] = patch[k];
    }
  }
  render();
};
// 入力中はDOMを再構築しない（カーソルが飛ぶのを防ぐ）
const setStateOnly = (patch) => {
  for (const k in patch) {
    if (patch[k] && typeof patch[k] === "object" && !Array.isArray(patch[k]) && state[k] && typeof state[k] === "object") {
      state[k] = {...state[k], ...patch[k]};
    } else {
      state[k] = patch[k];
    }
  }
};

// ─── Auth ─────────────────────────────────────────────
onAuthStateChanged(auth, (u) => {
  if (u) {
    setState({ authReady:true, user:u, authError:"" });
    startFirestoreListener();
  } else {
    setState({ authReady:true, user:null });
  }
});

let unsubFirestore = null;
function startFirestoreListener() {
  if (unsubFirestore) return;
  unsubFirestore = onSnapshot(collection(db,"trips"), (snap) => {
    const trips = snap.docs.map(d => ({...d.data(), id:d.id}))
      .sort((a,b) => (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0));
    setState({ trips });
  });
}

const handleLogin = async () => {
  setState({ authError:"" });
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    setState({ authError:"ログインに失敗しました。もう一度お試しください。" });
  }
};
const handleLogout = () => signOut(auth);

// ─── Trip操作 ─────────────────────────────────────────
const addTrip = async ({name, dateFrom, dateTo}) => {
  const id = `trip_${uid()}`;
  await saveTrip({ id, name, dateFrom, dateTo, categories:defaultCategories(), todos:[], items:[], createdAt:serverTimestamp() });
};
const copyTripFn = async (sourceId, {name, dateFrom, dateTo}) => {
  const source = state.trips.find(t => t.id === sourceId);
  if (!source) return;
  const id = `trip_${uid()}`;
  await saveTrip({ id, name, dateFrom, dateTo,
    categories: JSON.parse(JSON.stringify(source.categories)),
    todos: source.todos.map(t => ({...t, id:uid(), done:false})),
    items: source.items.map(i => ({...i, id:uid(), packed:false})),
    createdAt: serverTimestamp(),
  });
};
const deleteTripFn = async (id) => { if (confirm(`この旅行を削除しますか？`)) await deleteTrip(id); };

const persistTrip = async (updated) => {
  setState({ detail:{ saving:true } });
  try { await saveTrip(updated); } finally { setState({ detail:{ saving:false } }); }
};

// ─── スタイル定数 ──────────────────────────────────────
const S = {
  input: `width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#e8f0fe;font-size:14px;outline:none;`,
  select: `width:100%;padding:9px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#e8f0fe;font-size:13px;outline:none;cursor:pointer;`,
  dateInput: `width:100%;padding:9px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#e8f0fe;font-size:13px;outline:none;color-scheme:dark;`,
  btn: `padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#4A90D9,#7B68EE);color:white;font-weight:700;font-size:14px;cursor:pointer;`,
  btnGhost: `padding:12px 18px;border-radius:10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#8ba3c8;cursor:pointer;font-size:14px;`,
  card: `background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:18px 20px;`,
  formBox: `background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:20px;`,
};

// ─── HTML生成ヘルパー ──────────────────────────────────
const h = (tag, attrs, ...children) => {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k,v] of Object.entries(attrs)) {
      if (k === "style") el.style.cssText = v;
      else if (k.startsWith("on") && typeof v === "function") el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === "class") el.className = v;
      else el.setAttribute(k, v);
    }
  }
  for (const child of children.flat(Infinity)) {
    if (child == null || child === false) continue;
    el.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
  }
  return el;
};
const div  = (s,...c) => h("div",  {style:s},...c);
const span = (s,...c) => h("span", {style:s},...c);
const btn  = (s,cb,...c) => h("button", {style:s, onclick:cb},...c);
const inp = (s, val, ph, cb) => {
  const el = h("input", {style: s, placeholder: ph || ""});
  el.value = val || "";
  el.oninput = cb;
  return el;
};
const sel = (s, val, opts, cb) => {
  const el = h("select", {style: s});
  opts.forEach(o => { const op = h("option", {value: o.value}, o.label); if (o.value === val) op.selected = true; el.appendChild(op); });
  el.onchange = cb;
  return el;
};
const label = (text, s="") => h("label",{style:`font-size:11px;color:#5a7a9a;display:block;margin-bottom:4px;${s}`},text);
const progress = (done,total,color1,color2) => div(`height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;`,
  div(`height:100%;width:${total?(done/total*100):0}%;background:linear-gradient(90deg,${color1},${color2});border-radius:2px;transition:width 0.4s;`)
);

// ─── ログイン画面 ─────────────────────────────────────
function renderLogin() {
  const {authError} = state;
  return div(`min-height:100vh;background:linear-gradient(135deg,#0f1b2d 0%,#1a2f4a 50%,#0f1b2d 100%);display:flex;align-items:center;justify-content:center;padding:24px;`,
    div(`max-width:360px;width:100%;text-align:center;`,
      div(`font-size:52px;margin-bottom:16px;`, "🧳"),
      div(`font-size:24px;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px;`, "旅行プランナー"),
      div(`font-size:14px;color:#8ba3c8;margin-bottom:40px;`, "naoki & yumi の旅行管理アプリ"),
      authError && div(`background:rgba(220,80,80,0.15);border:1px solid rgba(220,80,80,0.3);border-radius:12px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#e07070;`, authError),
      btn(`width:100%;padding:14px 20px;border-radius:14px;border:none;cursor:pointer;background:rgba(255,255,255,0.12);color:#e8f0fe;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;`, handleLogin,
        (() => { const s = document.createElementNS("http://www.w3.org/2000/svg","svg"); s.setAttribute("width","20"); s.setAttribute("height","20"); s.setAttribute("viewBox","0 0 48 48"); s.innerHTML='<path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>'; return s; })(),
        "Googleでログイン"
      ),
      div(`font-size:12px;color:#4a6080;margin-top:16px;`, "許可されたアカウントのみ利用できます")
    )
  );
}

// ─── 旅行一覧画面 ─────────────────────────────────────
function renderTripList() {
  const {trips, user} = state;
  const {showForm, form} = state.list;
  const setForm = (patch) => setStateOnly({list:{showForm, form:{...form,...patch}}});
  const setShowForm = (v) => setState({list:{showForm:v, form:state.list.form}});

  const copySource = form.copyFrom ? trips.find(t=>t.id===form.copyFrom) : null;

  const handleAdd = async () => {
    const f = state.list.form;
    if (!f.name.trim()) return;
    if (f.copyFrom) { await copyTripFn(f.copyFrom, {name:f.name, dateFrom:f.dateFrom, dateTo:f.dateTo}); }
    else            { await addTrip({name:f.name, dateFrom:f.dateFrom, dateTo:f.dateTo}); }
    setState({list:{showForm:false, form:{name:"",dateFrom:"",dateTo:"",copyFrom:""}}});
  };

  const tripCards = trips.map(trip => {
    const todoDone   = (trip.todos||[]).filter(t=>t.done).length;
    const itemPacked = (trip.items||[]).filter(i=>i.packed).length;
    const card = div(`${S.card}cursor:pointer;transition:all 0.2s;margin-bottom:12px;`);
    card.addEventListener("click", () => setState({selectedId:trip.id, detail:{tab:"todo",showForm:false,showCatMgr:false,showTripEdit:false,filterMember:"all_members",filterCat:"all",filterOwnership:"all",tripName:trip.name,dateFrom:trip.dateFrom,dateTo:trip.dateTo,newCatLabel:"",newData:{text:"",category:"",member:"naoki",note:"",qty:1,ownership:"owned"},editId:null,itemMode:"new",existingSearch:"",existingSelected:null,saving:false}}));
    const inner = div(`display:flex;align-items:flex-start;justify-content:space-between;`);
    const info  = div(`flex:1;`);
    info.appendChild(div(`font-size:17px;font-weight:700;margin-bottom:4px;`, trip.name));
    info.appendChild(div(`font-size:12px;color:#8ba3c8;`,
      trip.dateFrom&&trip.dateTo ? `${fmtDate(trip.dateFrom)} 〜 ${fmtDate(trip.dateTo)}` : trip.dateFrom ? fmtDate(trip.dateFrom) : "日程未定"
    ));
    const bars = div(`display:flex;gap:16px;margin-top:12px;`);
    const mkBar = (label, done, total, c1, c2) => {
      const w = div(`flex:1;`);
      w.appendChild(div(`font-size:10px;color:#5a7a9a;margin-bottom:4px;`, `${label} ${done}/${total}`));
      w.appendChild(div(`width:80px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;`,
        div(`height:100%;width:${total?(done/total*100):0}%;background:linear-gradient(90deg,${c1},${c2});border-radius:2px;`)
      ));
      return w;
    };
    bars.appendChild(mkBar("タスク", todoDone, (trip.todos||[]).length, "#4A90D9","#7B68EE"));
    bars.appendChild(mkBar("荷物",   itemPacked,(trip.items||[]).length, "#E07B54","#E8A838"));
    info.appendChild(bars);
    const delBtn = btn(`background:rgba(220,80,80,0.12);border:1px solid rgba(220,80,80,0.25);border-radius:8px;color:#e07070;cursor:pointer;font-size:12px;padding:4px 10px;margin-left:12px;flex-shrink:0;`, (e)=>{ e.stopPropagation(); deleteTripFn(trip.id); }, "削除");
    inner.appendChild(info); inner.appendChild(delBtn);
    card.appendChild(inner);
    return card;
  });

  // フォーム部品
  const formEl = div(`${S.formBox}`);
  formEl.appendChild(div(`font-weight:700;font-size:15px;margin-bottom:16px;`, "新しい旅行"));
  const fields = div(`display:flex;flex-direction:column;gap:12px;`);

  if (trips.length > 0) {
    const copyWrap = div(``);
    copyWrap.appendChild(label("既存の旅行からコピー（任意）"));
    copyWrap.appendChild(sel(S.select, form.copyFrom,
      [{value:"",label:"コピーしない（新規作成）"}, ...trips.map(t=>({value:t.id,label:t.name}))],
      e => setForm({copyFrom:e.target.value})
    ));
    if (copySource) {
      copyWrap.appendChild(div(`margin-top:8px;padding:10px 12px;background:rgba(74,144,217,0.1);border:1px solid rgba(74,144,217,0.25);border-radius:10px;font-size:12px;color:#8ba3c8;`,
        span(`color:#4A90D9;font-weight:600;`,`「${copySource.name}」`), " のカテゴリー・タスク・持ち物をコピーします。チェック状態はリセットされます。"
      ));
    }
    fields.appendChild(copyWrap);
  }

  const nameWrap = div(``); nameWrap.appendChild(label("旅行名"));
  nameWrap.appendChild(inp(S.input, form.name, "例：宮古島旅行2027", e=>setForm({name:e.target.value})));
  fields.appendChild(nameWrap);

  const dates = div(`display:flex;gap:10px;`);
  const dfW = div(`flex:1;`); dfW.appendChild(label("出発日"));
  const dfI = h("input",{style:S.dateInput,type:"date"}); dfI.value=form.dateFrom||""; dfI.oninput=e=>setForm({dateFrom:e.target.value}); dfW.appendChild(dfI);
  const dtW = div(`flex:1;`); dtW.appendChild(label("帰着日"));
  const dtI = h("input",{style:S.dateInput,type:"date"}); dtI.value=form.dateTo||""; dtI.oninput=e=>setForm({dateTo:e.target.value}); dtW.appendChild(dtI);
  dates.appendChild(dfW); dates.appendChild(dtW); fields.appendChild(dates);

  const btns = div(`display:flex;gap:10px;margin-top:4px;`);
  btns.appendChild(btn(`flex:1;${S.btn}`, handleAdd, form.copyFrom?"コピーして作成":"作成"));
  btns.appendChild(btn(S.btnGhost, ()=>setState({list:{showForm:false,form:{name:"",dateFrom:"",dateTo:"",copyFrom:""}}}), "キャンセル"));
  fields.appendChild(btns);
  formEl.appendChild(fields);

  return div(`min-height:100vh;background:linear-gradient(135deg,#0f1b2d 0%,#1a2f4a 50%,#0f1b2d 100%);padding-bottom:80px;`,
    // ヘッダー
    div(`background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);padding:20px 24px;`,
      div(`max-width:520px;margin:0 auto;display:flex;align-items:center;gap:12px;`,
        span(`font-size:28px;`,"🧳"),
        div(`flex:1;`,
          div(`font-size:20px;font-weight:800;letter-spacing:-0.5px;`,"旅行プランナー"),
          div(`font-size:12px;color:#8ba3c8;margin-top:2px;`, user.email)
        ),
        btn(`background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#8ba3c8;cursor:pointer;font-size:12px;padding:6px 12px;`, handleLogout, "ログアウト")
      )
    ),
    // コンテンツ
    div(`max-width:520px;margin:0 auto;padding:24px 16px 0;`,
      ...tripCards,
      trips.length === 0 ? div(`text-align:center;padding:40px 0;color:#4a6080;font-size:14px;`, "旅行がまだありません") : "",
      !showForm ? btn(`width:100%;padding:14px;background:rgba(74,144,217,0.15);border:1.5px dashed rgba(74,144,217,0.5);border-radius:14px;color:#4A90D9;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;`,
        ()=>setState({list:{showForm:true,form:{name:"",dateFrom:"",dateTo:"",copyFrom:""}}}), "＋ 新しい旅行を追加"
      ) : formEl
    )
  );
}

// ─── 旅行詳細画面 ─────────────────────────────────────
function renderTripDetail() {
  const {trips, selectedId} = state;
  const trip = trips.find(t=>t.id===selectedId);
  if (!trip) { setState({selectedId:null}); return div(""); }

  const d = state.detail;
  const todos      = trip.todos  || [];
  const items      = trip.items  || [];
  const categories = trip.categories || defaultCategories();
  const cats       = categories[d.tab] || [];
  const getCat     = (id) => cats.find(c=>c.id===id) || {label:id,color:"#888"};
  const getMember  = (id) => MEMBERS.find(m=>m.id===id) || MEMBERS[0];
  const currentCat = d.newData.category || cats[0]?.id || "";

  const updateTrip = async (patch) => {
    setState({detail:{saving:true}});
    try { await saveTrip({...trip, ...patch, updatedAt:serverTimestamp()}); }
    finally { setState({detail:{saving:false}}); }
  };

  const filteredTodos = todos.filter(t=>
    (d.filterMember==="all_members"||t.member===d.filterMember)&&
    (d.filterCat==="all"||t.category===d.filterCat)
  );
  const filteredItems = items.filter(i=>
    (d.filterMember==="all_members"||i.member===d.filterMember)&&
    (d.filterCat==="all"||i.category===d.filterCat)&&
    (d.filterOwnership==="all"||i.ownership===d.filterOwnership)
  );

  const todoDone     = todos.filter(t=>t.done).length;
  const itemPacked   = items.filter(i=>i.packed).length;
  const itemsOwned   = items.filter(i=>i.ownership==="owned").length;
  const itemsBuy     = items.filter(i=>i.ownership==="buy").length;
  const itemsBuyDone = items.filter(i=>i.ownership==="buy"&&i.packed).length;

  const handleAdd = async () => {
    const nd = state.detail.newData;
    const currentCats = trip.categories?.[state.detail.tab] || [];
    if (!nd.text.trim()) return;
    const cat = nd.category || currentCats[0]?.id || "";
    if (state.detail.tab==="todo") {
      const next = state.detail.editId

        }
        content.appendChild(fBox);
        return div(`min-height:100vh;background:linear-gradient(135deg,#0f1b2d 0%,#1a2f4a 50%,#0f1b2d 100%);padding-bottom:80px;`, header, content);
      }
    }

    // 通常フォーム
    const fields2=div(`display:flex;flex-direction:column;gap:12px;`);
    fields2.appendChild(inp(S.input, d.newData.text, d.tab==="todo"?"タスク名...":"アイテム名...", e=>setStateOnly({detail:{newData:{...d.newData,text:e.target.value}}})));
    const row2=div(`display:flex;gap:10px;`);
    const cw=div(`flex:1;display:flex;flex-direction:column;gap:4px;`); cw.appendChild(label("カテゴリー")); cw.appendChild(sel(S.input, currentCat, cats.map(c=>({value:c.id,label:c.label})), e=>setState({detail:{newData:{...d.newData,category:e.target.value}}})));
    const mw=div(`display:flex;flex-direction:column;gap:4px;`); mw.appendChild(label("対象者")); mw.appendChild(sel(`${S.input}width:90px;`, d.newData.member, MEMBERS.map(m=>({value:m.id,label:m.label})), e=>setState({detail:{newData:{...d.newData,member:e.target.value}}})));
    row2.appendChild(cw); row2.appendChild(mw); fields2.appendChild(row2);

    if(d.tab==="item"){
      const owBox=div(``); owBox.appendChild(div(`font-size:12px;color:#8ba3c8;margin-bottom:8px;`,"持ち物の状態"));
      const owRow=div(`display:flex;gap:8px;`);
      [{value:"owned",label:"すでに持っている",ac:"#5BAD8F",ab:"rgba(91,173,143,0.2)",abr:"#5BAD8F"},{value:"buy",label:"購入が必要",ac:"#E8A838",ab:"rgba(232,168,56,0.2)",abr:"#E8A838"}].forEach(opt=>{
        const isA=d.newData.ownership===opt.value;
        owRow.appendChild(btn(`flex:1;padding:10px 8px;border-radius:12px;border:none;cursor:pointer;background:${isA?opt.ab:"rgba(255,255,255,0.05)"};outline:1.5px solid ${isA?opt.abr:"rgba(255,255,255,0.1)"};color:${isA?opt.ac:"#8ba3c8"};font-weight:${isA?700:400};font-size:13px;transition:all 0.18s;`,
          ()=>setState({detail:{newData:{...d.newData,ownership:opt.value}}}),opt.label
        ));
      });
      owBox.appendChild(owRow); fields2.appendChild(owBox);
    }
    if(d.tab==="todo") fields2.appendChild(inp(S.input,d.newData.note,"メモ（任意）...",e=>setStateOnly({detail:{newData:{...d.newData,note:e.target.value}}})));
    if(d.tab==="item"){
      const qtyRow=div(`display:flex;align-items:center;gap:10px;`);
      qtyRow.appendChild(span(`font-size:13px;color:#8ba3c8;`,"数量："));
      qtyRow.appendChild(btn(`width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#e8f0fe;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;`,()=>setState({detail:{newData:{...d.newData,qty:Math.max(1,d.newData.qty-1)}}}),"−"));
      qtyRow.appendChild(span(`font-size:16px;font-weight:600;min-width:24px;text-align:center;`,""+d.newData.qty));
      qtyRow.appendChild(btn(`width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#e8f0fe;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;`,()=>setState({detail:{newData:{...d.newData,qty:d.newData.qty+1}}}),"＋"));
      fields2.appendChild(qtyRow);
    }
    const fbRow=div(`display:flex;gap:10px;margin-top:4px;`);
    fbRow.appendChild(btn(`flex:1;${S.btn}`,handleAdd,d.editId?"更新":"追加"));
    fbRow.appendChild(btn(S.btnGhost,()=>setState({detail:{showForm:false,editId:null}}),"キャンセル"));
    fields2.appendChild(fbRow);
    fBox.appendChild(fields2);
    content.appendChild(fBox);
  }

  return div(`min-height:100vh;background:linear-gradient(135deg,#0f1b2d 0%,#1a2f4a 50%,#0f1b2d 100%);padding-bottom:80px;`, header, content);
}

// ─── メインレンダー ───────────────────────────────────
function render() {
  const root = document.getElementById("root");
  root.innerHTML = "";
  const {authReady, user, selectedId} = state;
  if (!authReady) { root.appendChild(div(`min-height:100vh;display:flex;align-items:center;justify-content:center;color:#8ba3c8;font-size:14px;`,"読み込み中...")); return; }
  if (!user)       { root.appendChild(renderLogin()); return; }
  if (selectedId)  { root.appendChild(renderTripDetail()); return; }
  root.appendChild(renderTripList());
}

render();
</script>
</body>
</html>
