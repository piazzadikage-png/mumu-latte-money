  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1b2d; color: #e8f0fe; font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; min-height: 100vh; }
    input, select, button, textarea { font-family: inherit; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .screen { min-height: 100vh; background: linear-gradient(135deg, #0f1b2d 0%, #1a2f4a 50%, #0f1b2d 100%); padding-bottom: 60px; }
    .sticky-header { background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 16px 20px 0; position: sticky; top: 0; z-index: 100; }
    .inner { max-width: 520px; margin: 0 auto; }
    .content { max-width: 520px; margin: 0 auto; padding: 20px 16px 0; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 18px 20px; margin-bottom: 12px; cursor: pointer; transition: background 0.2s; }
    .card:hover { background: rgba(255,255,255,0.09); }
    .form-box { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 20px; margin-top: 16px; }
    .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .field label { font-size: 11px; color: #5a7a9a; }
    input[type="text"], input[type="date"], select {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07);
      color: #e8f0fe; font-size: 14px; outline: none; color-scheme: dark;
    }
    input[type="text"]::placeholder { color: #4a6080; }
    .btn-primary { width: 100%; padding: 13px; border-radius: 10px; border: none; background: linear-gradient(135deg, #4A90D9, #7B68EE); color: white; font-weight: 700; font-size: 14px; cursor: pointer; }
    .btn-ghost { padding: 13px 18px; border-radius: 10px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); color: #8ba3c8; cursor: pointer; font-size: 14px; }
    .btn-add { width: 100%; padding: 14px; background: rgba(74,144,217,0.15); border: 1.5px dashed rgba(74,144,217,0.5); border-radius: 14px; color: #4A90D9; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 16px; }
    .tab-btn { flex: 1; padding: 10px 0; background: none; border: none; border-bottom: 2px solid transparent; color: #5a7a9a; font-weight: 400; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { border-bottom-color: #4A90D9; color: #e8f0fe; font-weight: 700; }
    .item-row { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; transition: opacity 0.2s; }
    .item-row.done { opacity: 0.5; }
    .check-circle { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .check-circle.checked { border-color: #4A90D9; background: #4A90D9; }
    .check-square { width: 22px; height: 22px; border-radius: 6px; border: 2px solid rgba(255,255,255,0.25); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .check-square.checked { border-color: #5BAD8F; background: #5BAD8F; }
    .member-badge { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; flex-shrink: 0; }
    .icon-btn { background: none; border: none; color: #4a6080; cursor: pointer; font-size: 15px; padding: 2px 4px; }
    .filter-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .filter-row select { font-size: 13px; }
    .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
    .ownership-btn { flex: 1; padding: 10px 8px; border-radius: 12px; border: none; cursor: pointer; font-size: 13px; transition: all 0.18s; background: rgba(255,255,255,0.05); outline: 1.5px solid rgba(255,255,255,0.1); color: #8ba3c8; }
    .ownership-btn.active-owned { background: rgba(91,173,143,0.2); outline-color: #5BAD8F; color: #5BAD8F; font-weight: 700; }
    .ownership-btn.active-buy { background: rgba(232,168,56,0.2); outline-color: #E8A838; color: #E8A838; font-weight: 700; }
    .mode-btn { flex: 1; padding: 9px 8px; border-radius: 10px; border: none; cursor: pointer; font-size: 13px; background: rgba(255,255,255,0.05); outline: 1.5px solid rgba(255,255,255,0.1); color: #8ba3c8; transition: all 0.18s; }
    .mode-btn.active { background: rgba(74,144,217,0.2); outline-color: #4A90D9; color: #74b4f7; font-weight: 700; }
    .login-screen { min-height: 100vh; background: linear-gradient(135deg,#0f1b2d 0%,#1a2f4a 50%,#0f1b2d 100%); display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-sheet { background: #162438; border-radius: 20px; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; padding: 24px 20px 28px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
    .modal-handle { display: none; }
    .qty-row { display: flex; align-items: center; gap: 16px; }
    .qty-btn { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #e8f0fe; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .cat-card { padding:8px 12px; border-radius:12px; border:1.5px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); transition:all 0.18s; cursor:pointer; display:flex; align-items:center; gap:10px; }
    .cat-card-num { font-size:22px; font-weight:800; line-height:1; flex-shrink:0; min-width:26px; }
    .cat-card-info { display:flex; flex-direction:column; gap:1px; }
    .cat-card-name { font-size:12px; font-weight:600; }
    .cat-card-stat { font-size:10px; color:#5a7a9a; display:flex; justify-content:space-between; gap:8px; }
  </style>
</head>

let _id = Date.now();
const uid = () => `id_${_id++}`;
const fmt = (d) => {
  if (!d) return "日程未定";
  // YYYY-MM-DD or YYYY-MM-DDTHH:mm 形式に対応
  const clean = String(d).slice(0, 10);
  const [y,m,day] = clean.split("-");
  if (!y||!m||!day) return d;
  return `${y}年${+m}月${+day}日`;
};

// ═══════════════════════════════════════
// Firebase操作
// ═══════════════════════════════════════
const saveTrip   = (t) => setDoc(doc(db,"trips",t.id), {...t, updatedAt:serverTimestamp()});
const removeTrp  = (id) => deleteDoc(doc(db,"trips",id));

onAuthStateChanged(auth, (u) => {
  user = u;
  if (u) startListener();
  render();
});

let unsub = null;
function startListener() {
  if (unsub) return;
  unsub = onSnapshot(collection(db,"trips"), (snap) => {
    trips = snap.docs.map(d => ({...d.data(), id:d.id}))
      .sort((a,b) => (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0));
    render();
  });
}

// ═══════════════════════════════════════
// レンダリング
// ═══════════════════════════════════════
function render() {
  const app = document.getElementById("app");
  if (!user) { app.innerHTML = loginHTML(); bindLogin(); return; }
  if (selectedTripId) {
    const trip = trips.find(t=>t.id===selectedTripId);
    if (!trip) { selectedTripId=null; render(); return; }
    app.innerHTML = detailHTML(trip);
    bindDetail(trip);
  } else {
    app.innerHTML = listHTML();
    bindList();
  }
}

        <button class="btn-primary" id="lf-submit" style="flex:1;">${listForm.copyFrom?"コピーして作成":"作成"}</button>

function bindList() {
  document.getElementById("logoutBtn")?.addEventListener("click", ()=>signOut(auth));
  document.getElementById("lf-open")?.addEventListener("click", ()=>{ listForm={name:"",dateFrom:"",dateTo:"",copyFrom:"",open:true}; render(); });
  document.getElementById("lf-cancel")?.addEventListener("click", ()=>{ listForm.open=false; render(); });

  // 入力値をリアルタイムでstateに保存（DOMを再描画しない）
  document.getElementById("lf-name")?.addEventListener("input", e=>{ listForm.name=e.target.value; });
  document.getElementById("lf-from")?.addEventListener("change", e=>{ listForm.dateFrom=e.target.value; });
  document.getElementById("lf-to")?.addEventListener("change",   e=>{ listForm.dateTo=e.target.value; });
  document.getElementById("lf-copy")?.addEventListener("change",  e=>{ listForm.copyFrom=e.target.value; });

  document.getElementById("lf-submit")?.addEventListener("click", async ()=>{
    const name = document.getElementById("lf-name")?.value.trim();
    if (!name) return;
    const dateFrom = document.getElementById("lf-from")?.value || "";
    const dateTo   = document.getElementById("lf-to")?.value   || "";
    const copyFrom = document.getElementById("lf-copy")?.value || "";
    const id = `trip_${uid()}`;
    if (copyFrom) {
      const src = trips.find(t=>t.id===copyFrom);
      if (src) await saveTrip({id, name, dateFrom, dateTo,
        categories: JSON.parse(JSON.stringify(src.categories||defaultCategories())),
        todos: (src.todos||[]).map(t=>({...t,id:uid(),done:false})),
        items: (src.items||[]).map(i=>({...i,id:uid(),packed:false})),
        createdAt: serverTimestamp(),
      });
    } else {
      await saveTrip({id, name, dateFrom, dateTo, categories:defaultCategories(), todos:[], items:[], createdAt:serverTimestamp()});
    }
    listForm = {name:"",dateFrom:"",dateTo:"",copyFrom:"",open:false};
    render();
  });

  document.querySelectorAll(".card[data-tripid]").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.closest(".del-trip")) return;
      const id = el.dataset.tripid;
      const t  = trips.find(x=>x.id===id);
      if (!t) return;
      selectedTripId = id;
      detail = { tab:"todo", showForm:false, showCatMgr:false, showTripEdit:false, editId:null,
        filterMember:"all_members", filterCat:"all", filterOwnership:"all",
        newName:t.name, newDateFrom:t.dateFrom||"", newDateTo:t.dateTo||"",
        form:{text:"",category:"",member:"naoki",note:"",qty:1,ownership:"owned",dueDate:"",brand:""},
        catLabel:"", itemMode:"new", existingSearch:"", saving:false };
      render();
    });
  });

  document.querySelectorAll(".del-trip").forEach(el => {
    el.addEventListener("click", async (e) => {
      e.stopPropagation();
      const id = el.dataset.tripid;
      const t  = trips.find(x=>x.id===id);
      if (t && confirm(`「${t.name}」を削除しますか？`)) await removeTrp(id);
    });
  });
}

    (detail.filterMember==="all_members"||t.member===detail.filterMember)&&

        </div></div>
        <div class="field"><input type="text" id="f-brand" placeholder="🏷️ ブランド名（任意）..." value="${esc(detail.form.brand||'')}"></div>
        <div class="field"><input type="text" id="f-note" placeholder="✍️ メモ（任意）..." value="${esc(detail.form.note||'')}"></div>`:""}
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button class="btn-primary" id="f-submit" style="flex:1;">${detail.editId?"更新":"追加"}</button>
        <button class="btn-ghost" id="form-cancel">キャンセル</button>
      </div>`;
  }

  // リスト
  const todoListHTML = ftodos.length===0
    ? '<div style="text-align:center;padding:40px 0;color:#4a6080;font-size:14px;">タスクがありません</div>'
    : ftodos.map(t => {
        const cat=getCat(t.category), mem=getMem(t.member);
        return `<div class="item-row ${t.done?"done":""}" style="border-left:3px solid ${t.done?"#2a3a4a":cat.color};">
          <button class="check-circle ${t.done?"checked":""}" data-id="${t.id}" style="${t.done?`border-color:${cat.color};background:${cat.color};`:""}">
            ${t.done?'<span style="color:white;font-size:11px;">✓</span>':""}
          </button>
          <div style="flex:1;min-width:0;">
            <div style="font-size:15px;font-weight:500;${t.done?"text-decoration:line-through;":""}white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(t.text)}</div>
            <div style="font-size:12px;color:#5a7a9a;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;">
              <span style="color:${cat.color};">${cat.label}</span>
              ${t.dueDate?`<span>📅 ${fmt(t.dueDate)}</span>`:""}
              ${t.note?`<span>✍️ ${esc(t.note)}</span>`:""}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
            <div class="member-badge" style="background:${mem.color};">${mem.label.slice(0,2)}</div>
            <button class="edit-item icon-btn" data-type="todo" data-id="${t.id}">✏️</button>
            <button class="del-item  icon-btn" data-type="todo" data-id="${t.id}">✕</button>
          </div>
        </div>`;
      }).join("");

  const itemListHTML = fitems.length===0
    ? '<div style="text-align:center;padding:40px 0;color:#4a6080;font-size:14px;">アイテムがありません</div>'
    : fitems.map(i => {
        const cat=getCat(i.category), mem=getMem(i.member), isBuy=i.ownership==="buy";
        const ac=isBuy?"#E8A838":"#5BAD8F";
        return `<div class="item-row ${i.packed?"done":""}" style="border-left:3px solid ${i.packed?"#2a3a4a":cat.color};background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);border-left-color:${i.packed?"#2a3a4a":cat.color};">
          <button class="check-square ${i.packed?"checked":""}" data-id="${i.id}" style="${i.packed?`border-color:${cat.color};background:${cat.color};`:""}">
            ${i.packed?'<span style="color:white;font-size:11px;">✓</span>':""}
          </button>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span style="font-size:15px;font-weight:500;${i.packed?"text-decoration:line-through;":""}">
                ${esc(i.text)}${i.qty>1?`<span style="font-size:12px;color:#8ba3c8;background:rgba(255,255,255,0.08);padding:1px 8px;border-radius:10px;margin-left:4px;">×${i.qty}</span>`:""}
              </span>
              <button class="toggle-own icon-btn" data-id="${i.id}" data-own="${i.ownership}" style="display:inline-flex;align-items:center;gap:3px;background:${isBuy?"rgba(232,168,56,0.15)":"rgba(91,173,143,0.13)"};color:${ac};border:1px solid ${isBuy?"rgba(232,168,56,0.4)":"rgba(91,173,143,0.4)"};border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;">
                ${isBuy?"購入が必要 ✓":"すでに持ってる"}
              </button>
            </div>
            <div style="font-size:12px;color:#5a7a9a;margin-top:5px;display:flex;gap:8px;flex-wrap:wrap;">
              <span style="color:${cat.color};">${cat.label}</span>
              ${i.brand?`<span style="color:#8ba3c8;">🏷️ ${esc(i.brand)}</span>`:""}
              ${i.note?`<span style="color:#5a7a9a;">✍️ ${esc(i.note)}</span>`:""}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
            <div class="member-badge" style="background:${mem.color};">${mem.label.slice(0,2)}</div>
            <button class="edit-item icon-btn" data-type="item" data-id="${i.id}">✏️</button>
            <button class="del-item  icon-btn" data-type="item" data-id="${i.id}">✕</button>
          </div>
        </div>`;
      }).join("");

  // カテゴリー別ダッシュボード
  const makeDashboard = () => {
    const makeCatCard = (c, total, done, notDone) => {
      const isActive = detail.filterCat === c.id;
      return `<div class="cat-card" data-catid="${c.id}" style="border-color:${isActive?c.color:"rgba(255,255,255,0.1)"};background:${isActive?`${c.color}22`:"rgba(255,255,255,0.04)"};">
        <div class="cat-card-num" style="color:${isActive?c.color:"#e8f0fe"};">${total}</div>
        <div class="cat-card-info">
          <div class="cat-card-name" style="color:${isActive?c.color:"#8ba3c8"};">${c.label}</div>
          ${total>0?`<div class="cat-card-stat"><span>完了済み</span><span style="color:${c.color};font-weight:600;">${done}</span></div>
          <div class="cat-card-stat"><span>未完了</span><span style="font-weight:600;">${notDone}</span></div>`:""}
        </div>
      </div>`;
    };
    if (detail.tab === "todo") {
      const allCats = (trip.categories||defaultCategories()).todo;
      const cards = allCats.map(c => {
        const total = todos.filter(t=>t.category===c.id).length;
        const done  = todos.filter(t=>t.category===c.id&&t.done).length;
        return makeCatCard(c, total, done, total-done);
      }).join("");
      return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">${cards}</div>`;
    } else {
      const allCats = (trip.categories||defaultCategories()).item;
      const cards = allCats.map(c => {
        const total  = items.filter(i=>i.category===c.id).length;
        const packed = items.filter(i=>i.category===c.id&&i.packed).length;
        return makeCatCard(c, total, packed, total-packed);
      }).join("");
      return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">${cards}</div>`;
    }
  };

  return `<div class="screen">
    <div class="sticky-header">
      <div class="inner">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
          <button id="back-btn" class="icon-btn" style="font-size:20px;">←</button>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(trip.name)}</span>
              <button id="trip-edit-btn" class="icon-btn">✏️</button>
              ${detail.saving?'<span style="font-size:11px;color:#5a7a9a;">保存中...</span>':""}
            </div>
            <div style="font-size:12px;color:#8ba3c8;">${trip.dateFrom&&trip.dateTo?fmt(trip.dateFrom)+' 〜 '+fmt(trip.dateTo):trip.dateFrom?fmt(trip.dateFrom):"日程未定"}</div>
          </div>
        </div>
        ${tripEditHTML}
        <div style="display:flex;gap:16px;margin-bottom:12px;margin-top:8px;">
          <div style="flex:1;"><div style="font-size:11px;color:#8ba3c8;margin-bottom:4px;">タスク ${todoDone}/${tLen}</div><div class="progress-bar"><div class="progress-fill" style="width:${tLen?(todoDone/tLen*100):0}%;background:linear-gradient(90deg,#4A90D9,#7B68EE);"></div></div></div>
          <div style="flex:1;"><div style="font-size:11px;color:#8ba3c8;margin-bottom:4px;">荷物 ${itemPacked}/${iLen}</div><div class="progress-bar"><div class="progress-fill" style="width:${iLen?(itemPacked/iLen*100):0}%;background:linear-gradient(90deg,#E07B54,#E8A838);"></div></div></div>
        </div>
        <div style="display:flex;">
          <button class="tab-btn ${detail.tab==="todo"?"active":""}" id="tab-todo">To-Do</button>
          <button class="tab-btn ${detail.tab==="item"?"active":""}" id="tab-item">持ち物</button>
        </div>
      </div>
    </div>
    <div class="content">
      ${makeDashboard()}
      <div style="margin-bottom:14px;">
        <div style="display:flex;gap:8px;">
          <div class="field" style="flex:1;"><label>対象者</label><select id="fil-member"><option value="all_members"${detail.filterMember==="all_members"?" selected":""}>全員</option>${MEMBERS.map(m=>`<option value="${m.id}"${m.id===detail.filterMember?" selected":""}>${m.label}</option>`).join("")}</select></div>
          ${detail.tab==="item"?`<div class="field" style="flex:1;"><label>購入状況</label><select id="fil-ownership"><option value="all"${detail.filterOwnership==="all"?" selected":""}>すべて</option><option value="owned"${detail.filterOwnership==="owned"?" selected":""}>持っている</option><option value="buy"${detail.filterOwnership==="buy"?" selected":""}>購入が必要</option></select></div>`:""}
        </div>
      </div>
      ${detail.tab==="todo" ? todoListHTML : itemListHTML}
      ${!detail.showCatMgr?`
        <div style="display:flex;gap:10px;margin-top:16px;">
          <button class="btn-add" id="form-open" style="flex:1;margin-top:0;">＋ ${detail.tab==="todo"?"タスクを追加":"アイテムを追加"}</button>
          <button class="btn-ghost" id="catmgr-open" style="white-space:nowrap;">カテゴリー管理</button>
        </div>`:""}
      ${catMgrHTML}
    </div>
  </div>
  ${formHTML}`;
}

function bindDetail(trip) {
  const todos = trip.todos||[], items = trip.items||[];
  const cats  = (trip.categories||defaultCategories())[detail.tab]||[];
  const categories = trip.categories||defaultCategories();

  const update = async (patch) => {
    detail.saving=true;
    await saveTrip({...trip,...patch,updatedAt:serverTimestamp()});
    detail.saving=false;
  };

  document.getElementById("back-btn")?.addEventListener("click", ()=>{ selectedTripId=null; render(); });
  document.getElementById("tab-todo")?.addEventListener("click", ()=>{ detail.tab="todo"; detail.filterCat="all"; detail.showForm=false; detail.showCatMgr=false; render(); });
  document.getElementById("tab-item")?.addEventListener("click", ()=>{ detail.tab="item"; detail.filterCat="all"; detail.showForm=false; detail.showCatMgr=false; render(); });
  document.getElementById("fil-member")?.addEventListener("change", e=>{ detail.filterMember=e.target.value; render(); });
  document.getElementById("fil-ownership")?.addEventListener("change", e=>{ detail.filterOwnership=e.target.value; render(); });
  document.querySelectorAll(".cat-card").forEach(el=>{
    el.addEventListener("click", ()=>{ detail.filterCat=detail.filterCat===el.dataset.catid?"all":el.dataset.catid; render(); });
  });

  // 旅行名編集
  document.getElementById("trip-edit-btn")?.addEventListener("click", ()=>{ detail.showTripEdit=!detail.showTripEdit; detail.showForm=false; detail.showCatMgr=false; render(); });
  document.getElementById("te-cancel")?.addEventListener("click", ()=>{ detail.showTripEdit=false; render(); });
  document.getElementById("te-save")?.addEventListener("click", async ()=>{
    const name = document.getElementById("te-name")?.value.trim();
    if (!name) return;
    const dateFrom = document.getElementById("te-from")?.value||"";
    const dateTo   = document.getElementById("te-to")?.value||"";
    await update({name, dateFrom, dateTo});
    detail.newName=name; detail.newDateFrom=dateFrom; detail.newDateTo=dateTo;
    detail.showTripEdit=false;
  });

  // チェック
  document.querySelectorAll(".check-circle").forEach(el=>{
    el.addEventListener("click", ()=>update({todos:todos.map(t=>t.id===el.dataset.id?{...t,done:!t.done}:t)}));
  });
  document.querySelectorAll(".check-square").forEach(el=>{
    el.addEventListener("click", ()=>update({items:items.map(i=>i.id===el.dataset.id?{...i,packed:!i.packed}:i)}));
  });
  // 所有状態トグル（購入が必要 ↔ すでに持ってる）
  document.querySelectorAll(".toggle-own").forEach(el=>{
    el.addEventListener("click", (e)=>{
      e.stopPropagation();
      const newOwn = el.dataset.own==="buy" ? "owned" : "buy";
      update({items:items.map(i=>i.id===el.dataset.id?{...i,ownership:newOwn}:i)});
    });
  });

  // 編集・削除
  document.querySelectorAll(".edit-item").forEach(el=>{
    el.addEventListener("click", ()=>{
      const type=el.dataset.type, id=el.dataset.id;
      const src = type==="todo" ? todos.find(t=>t.id===id) : items.find(i=>i.id===id);
      if (!src) return;
      detail.form={text:src.text,category:src.category,member:src.member,note:src.note||"",qty:src.qty||1,ownership:src.ownership||"owned",dueDate:src.dueDate||"",brand:src.brand||""};
      detail.editId=id; detail.showForm=true; detail.showCatMgr=false; detail.showTripEdit=false;
      render();
    });
  });
  document.querySelectorAll(".del-item").forEach(el=>{
    el.addEventListener("click", ()=>{
      const type=el.dataset.type, id=el.dataset.id;
      if (type==="todo") update({todos:todos.filter(t=>t.id!==id)});
      else               update({items:items.filter(i=>i.id!==id)});
    });
  });

  // フォームを開く
  document.getElementById("form-open")?.addEventListener("click", ()=>{
    detail.form={text:"",category:cats[0]?.id||"",member:"naoki",note:"",qty:1,ownership:"owned",dueDate:"",brand:""};
    detail.editId=null; detail.showForm=true; detail.showCatMgr=false; detail.showTripEdit=false; detail.itemMode="new"; detail.existingSearch="";
    render();
  });
  document.getElementById("form-cancel")?.addEventListener("click", ()=>{ detail.showForm=false; detail.editId=null; render(); });
  // オーバーレイをタップで閉じる
  document.getElementById("modal-overlay")?.addEventListener("click", (e)=>{ if(e.target.id==="modal-overlay"){detail.showForm=false;detail.editId=null;render();} });
  document.getElementById("catmgr-open")?.addEventListener("click", ()=>{ detail.showCatMgr=true; detail.showForm=false; render(); });
  document.getElementById("cat-close")?.addEventListener("click",   ()=>{ detail.showCatMgr=false; render(); });

  // モード切替（持ち物）
  document.getElementById("mode-new")?.addEventListener("click",      ()=>{ detail.itemMode="new"; render(); });
  document.getElementById("mode-existing")?.addEventListener("click", ()=>{ detail.itemMode="existing"; detail.existingSearch=""; render(); });

  // 既存検索
  document.getElementById("ex-search")?.addEventListener("input", e=>{
    detail.existingSearch=e.target.value;
    // アイテムをre-renderせず選択状態だけ更新
  });

  // 既存アイテム選択
  let selectedExisting = null;
  document.querySelectorAll(".ex-item").forEach(el=>{
    el.addEventListener("click", ()=>{
      document.querySelectorAll(".ex-item").forEach(x=>{ x.style.background="rgba(255,255,255,0.04)"; x.style.borderColor="rgba(255,255,255,0.08)"; x.querySelector("div").style.background="transparent"; x.querySelector("div").style.borderColor="rgba(255,255,255,0.2)"; });
      el.style.background="rgba(74,144,217,0.15)"; el.style.borderColor="#4A90D9";
      el.querySelector("div").style.background="#4A90D9"; el.querySelector("div").style.borderColor="#4A90D9";
      selectedExisting = el.dataset;
      const addBtn = document.getElementById("ex-add");
      if (addBtn) { addBtn.disabled=false; addBtn.style.opacity="1"; }
    });
  });
  document.getElementById("ex-add")?.addEventListener("click", async ()=>{
    if (!selectedExisting) return;
    const catExists = categories.item.find(c=>c.id===selectedExisting.catid);
    await update({items:[...items,{id:uid(),text:selectedExisting.text,category:catExists?selectedExisting.catid:(categories.item[0]?.id||""),member:selectedExisting.member,qty:+selectedExisting.qty,ownership:selectedExisting.own,packed:false}]});
    detail.showForm=false;
  });

  // 所有状態ボタン
  document.getElementById("own-owned")?.addEventListener("click", ()=>{ detail.form.ownership="owned"; render(); });
  document.getElementById("own-buy")?.addEventListener("click",   ()=>{ detail.form.ownership="buy";   render(); });

  // 数量
  document.getElementById("qty-minus")?.addEventListener("click", ()=>{ detail.form.qty=Math.max(1,detail.form.qty-1); document.getElementById("qty-val").textContent=detail.form.qty; });
  document.getElementById("qty-plus")?.addEventListener("click",  ()=>{ detail.form.qty++; document.getElementById("qty-val").textContent=detail.form.qty; });

  // フォーム送信
  document.getElementById("f-submit")?.addEventListener("click", async ()=>{
    const text = document.getElementById("f-text")?.value.trim();
    if (!text) return;
    const cat    = document.getElementById("f-cat")?.value    || cats[0]?.id || "";
    const member = document.getElementById("f-member")?.value || "naoki";
    const note   = document.getElementById("f-note")?.value   || "";
    const dueDate = document.getElementById("f-due")?.value   || "";
    const brand  = document.getElementById("f-brand")?.value  || "";
    if (detail.tab==="todo") {
      const next = detail.editId
        ? todos.map(t=>t.id===detail.editId?{...t,text,category:cat,member,note,dueDate}:t)
        : [...todos,{id:uid(),text,category:cat,member,note,dueDate,done:false}];
      await update({todos:next});
    } else {
      const next = detail.editId
        ? items.map(i=>i.id===detail.editId?{...i,text,category:cat,member,note,brand,qty:detail.form.qty,ownership:detail.form.ownership}:i)
        : [...items,{id:uid(),text,category:cat,member,note,brand,qty:detail.form.qty,ownership:detail.form.ownership,packed:false}];
      await update({items:next});
    }
    detail.showForm=false; detail.editId=null;
    detail.form={text:"",category:"",member:"naoki",note:"",qty:1,ownership:"owned",dueDate:"",brand:""};
  });

  // カテゴリー追加・削除
  document.getElementById("cat-add")?.addEventListener("click", async ()=>{
    const label = document.getElementById("cat-input")?.value.trim();
    if (!label) return;
    const nc={id:`cat_${uid()}`,label,color:COLORS[cats.length%COLORS.length]};
    await update({categories:{...categories,[detail.tab]:[...cats,nc]}});
    detail.showCatMgr=true;
  });
  document.querySelectorAll(".del-cat").forEach(el=>{
    el.addEventListener("click", ()=>update({categories:{...categories,[detail.tab]:cats.filter(c=>c.id!==el.dataset.catid)}}));
  });
}

// ═══════════════════════════════════════
// ユーティリティ
// ═══════════════════════════════════════
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

render();
</script>
</body>
</html>
