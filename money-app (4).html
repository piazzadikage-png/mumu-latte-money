<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>mumu latte money</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="https://i.imgur.com/rDhfFb8.jpeg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="mumu latte money">
<meta name="theme-color" content="#f7f6f3">
<style>
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --border: #e8e6e0;
    --text: #1a1a1a; --muted: #9a9690;
    --income: #2d6a4f; --expense: #c0392b; --accent: #1a1a1a;
    --naoki: #2c5f8a; --yumi: #8a4a7a; --diff-pos: #2d6a4f; --diff-neg: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 20px 60px; }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 32px; }

  /* LOGIN */
  #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; gap: 24px; }
  .login-title { font-family: 'DM Mono', monospace; font-size: 22px; letter-spacing: 0.1em; color: var(--text); }
  .login-sub { font-size: 13px; color: var(--muted); text-align: center; }
  .google-btn { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 24px; cursor: pointer; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; color: var(--text); transition: box-shadow 0.2s; }
  .google-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .google-btn svg { width: 20px; height: 20px; }

  /* USER BAR */
  .user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .user-info { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .user-avatar-sm { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
  .logout-btn { font-size: 11px; font-family: 'DM Mono', monospace; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: none; cursor: pointer; color: var(--muted); }
  .logout-btn:hover { background: var(--border); }

  /* NAV */
  .nav-tabs { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 28px; background: var(--border); gap: 1px; }
  .nav-tab { flex: 1; padding: 10px; font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; cursor: pointer; border: none; background: var(--bg); color: var(--muted); transition: all 0.15s; }
  .nav-tab.active { background: var(--accent); color: white; }
  .page { display: none; }
  .page.active { display: block; }

  /* SUMMARY */
  .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .summary-item { background: var(--surface); padding: 16px; }
  .summary-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .summary-value { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500; }
  .summary-value.income { color: var(--income); }
  .summary-value.expense { color: var(--expense); }

  /* MEMBER CARDS */
  .member-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
  .member-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .member-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .member-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: white; font-family: 'DM Mono', monospace; }
  .member-avatar.naoki { background: var(--naoki); }
  .member-avatar.yumi { background: var(--yumi); }
  .member-name { font-size: 13px; font-weight: 500; text-transform: capitalize; }
  .member-stat { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .member-stat-label { font-size: 11px; color: var(--muted); }
  .member-stat-value { font-family: 'DM Mono', monospace; font-size: 11px; }
  .member-stat-value.income { color: var(--income); }
  .member-stat-value.expense { color: var(--expense); }

  /* FORM */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 28px; }
  .form-title { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 6px; min-width: 0; overflow: hidden; }
  label { font-size: 11px; color: var(--muted); }
  input, select { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 16px; font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; width: 100%; min-width: 0; box-sizing: border-box; }
  input[type="date"] { appearance: none; -webkit-appearance: none; }
  input:focus, select:focus { border-color: var(--accent); }
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; height: 44px; }
  .type-btn { padding: 10px 12px; font-size: 14px; cursor: pointer; border: none; background: var(--bg); color: var(--muted); transition: all 0.15s; font-family: 'Noto Sans JP', sans-serif; height: 44px; }
  .type-btn.active.income { background: var(--income); color: white; }
  .type-btn.active.expense { background: var(--expense); color: white; }
  .member-toggle { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; height: 44px; }
  .member-btn { padding: 10px 12px; font-size: 14px; cursor: pointer; border: none; background: var(--bg); color: var(--muted); transition: all 0.15s; font-family: 'DM Mono', monospace; height: 44px; }
  .member-btn.active.naoki { background: var(--naoki); color: white; }
  .member-btn.active.yumi { background: var(--yumi); color: white; }
  .submit-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; margin-top: 4px; font-family: 'Noto Sans JP', sans-serif; transition: opacity 0.2s; }
  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  /* REPEAT CHECKBOX */
  .repeat-row { display: flex; align-items: center; gap: 10px; padding: 10px 0 4px; }
  .repeat-checkbox { width: 18px; height: 18px; accent-color: var(--income); cursor: pointer; flex-shrink: 0; }
  .repeat-label { font-size: 13px; color: var(--text); cursor: pointer; user-select: none; }
  .repeat-label span { font-size: 11px; color: var(--muted); margin-left: 4px; }


  /* FIXED EXPENSES */
  .fixed-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 28px; }
  .fixed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .fixed-title { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .reflect-btn { font-size: 11px; font-family: 'DM Mono', monospace; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--income); background: none; cursor: pointer; color: var(--income); transition: all 0.15s; }
  .reflect-btn:hover { background: var(--income); color: white; }
  .add-fixed-btn { font-size: 11px; font-family: 'DM Mono', monospace; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: none; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .add-fixed-btn:hover { background: var(--border); }
  .fixed-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .fixed-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg); border-radius: 8px; }
  .fixed-item-info { flex: 1; min-width: 0; }
  .fixed-item-name { font-size: 13px; }
  .fixed-item-meta { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .fixed-item-amount { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--expense); flex-shrink: 0; }
  .fixed-delete { background: none; border: none; color: var(--border); cursor: pointer; font-size: 14px; }
  .fixed-delete:hover { color: var(--expense); }
  .fixed-form { border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 8px; display: none; }
  .fixed-form.open { display: block; }
  .fixed-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .fixed-form-row.full { grid-template-columns: 1fr; }

  /* LIST */
  .section-title { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .transaction-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .transaction { background: var(--surface); padding: 14px 18px; display: flex; align-items: center; gap: 12px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .tx-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; color: white; font-family: 'DM Mono', monospace; flex-shrink: 0; }
  .tx-avatar.naoki { background: var(--naoki); }
  .tx-avatar.yumi { background: var(--yumi); }
  .tx-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .tx-dot.income { background: var(--income); }
  .tx-dot.expense { background: var(--expense); }
  .tx-info { flex: 1; min-width: 0; }
  .tx-desc { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .tx-amount { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; flex-shrink: 0; }
  .tx-amount.income { color: var(--income); }
  .tx-amount.expense { color: var(--expense); }
  .tx-delete { background: none; border: none; color: var(--border); cursor: pointer; font-size: 16px; padding: 0 2px; }
  .tx-delete:hover { color: var(--expense); }
  .empty { background: var(--surface); padding: 40px; text-align: center; color: var(--muted); font-size: 13px; border: 1px solid var(--border); border-radius: 12px; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-tab { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; background: var(--surface); color: var(--muted); transition: all 0.15s; }
  .filter-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  .filter-tab.active.naoki-f { background: var(--naoki); border-color: var(--naoki); }
  .filter-tab.active.yumi-f { background: var(--yumi); border-color: var(--yumi); }

  /* CHART */
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .month-nav { display: flex; align-items: center; gap: 12px; }
  .month-nav button { background: none; border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; color: var(--text); }
  .month-label { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .chart-card-title { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }

  /* Bar chart with diff line */
  .bar-chart-wrap { position: relative; }
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 140px; position: relative; }
  .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; }
  .bar-pair { display: flex; gap: 2px; align-items: flex-end; flex: 1; width: 100%; }
  .bar { flex: 1; border-radius: 3px 3px 0 0; min-height: 0; transition: height 0.4s ease; position: relative; }
  .bar.income { background: var(--income); opacity: 0.85; }
  .bar.expense { background: var(--expense); opacity: 0.85; }
  .bar-month { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); }
  .bar-diff { position: absolute; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; border-radius: 50%; z-index: 2; }
  .bar-diff.pos { background: var(--income); }
  .bar-diff.neg { background: var(--expense); }
  .diff-line-svg { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 18px); pointer-events: none; }

  .chart-legend { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .legend-dot.income { background: var(--income); }
  .legend-dot.expense { background: var(--expense); }
  .legend-dot.diff { background: #888; border-radius: 50%; }

  .chart-member-filter { display: flex; gap: 8px; margin-bottom: 16px; }
  .chart-member-btn { font-size: 11px; font-family: 'DM Mono', monospace; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; background: var(--surface); color: var(--muted); transition: all 0.15s; }
  .chart-member-btn.active { color: white; border-color: transparent; }
  .chart-member-btn.active.all { background: var(--accent); }
  .chart-member-btn.active.naoki { background: var(--naoki); }
  .chart-member-btn.active.yumi { background: var(--yumi); }

  .month-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .month-summary .summary-item { padding: 12px 14px; }
  .month-summary .summary-value { font-size: 13px; }

  /* Category breakdown with member split */
  .category-list { display: flex; flex-direction: column; gap: 12px; }
  .cat-item { display: flex; flex-direction: column; gap: 4px; }
  .cat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .cat-name { font-size: 15px; }
  .cat-amount { font-family: 'DM Mono', monospace; font-size: 14px; }
  .cat-member-bars { display: flex; flex-direction: column; gap: 3px; }
  .cat-member-row { display: flex; align-items: center; gap: 6px; }
  .cat-member-label { font-size: 10px; font-family: 'DM Mono', monospace; width: 36px; flex-shrink: 0; }
  .cat-member-label.naoki { color: var(--naoki); }
  .cat-member-label.yumi { color: var(--yumi); }
  .cat-bar-track { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .cat-bar-fill.naoki { background: var(--naoki); opacity: 0.8; }
  .cat-bar-fill.yumi { background: var(--yumi); opacity: 0.8; }
  .cat-bar-fill.expense { background: var(--expense); opacity: 0.7; }
  .cat-bar-fill.income { background: var(--income); opacity: 0.7; }
  .cat-member-val { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); width: 60px; text-align: right; flex-shrink: 0; }

  .member-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .member-bar-label { font-size: 11px; font-family: 'DM Mono', monospace; width: 42px; flex-shrink: 0; }
  .member-bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .member-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .member-bar-fill.naoki { background: var(--naoki); }
  .member-bar-fill.yumi { background: var(--yumi); }
  .member-bar-val { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); width: 70px; text-align: right; flex-shrink: 0; }


  .bar.diff-pos { background: var(--income); opacity: 0.85; }
  .bar.diff-neg { background: var(--expense); opacity: 0.85; }
  .bar-val { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--muted); text-align: center; margin-bottom: 1px; }
  .cat-item.clickable { cursor: pointer; }
  .cat-item.clickable:hover .cat-name { text-decoration: underline; }
  .cat-back-btn { font-size: 11px; font-family: 'DM Mono', monospace; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: none; cursor: pointer; color: var(--muted); margin-bottom: 12px; }
  .cat-back-btn:hover { background: var(--border); }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; font-family: 'DM Mono', monospace; }
  /* HISTORY MONTH NAV */
  .history-month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .history-month-nav button { background: none; border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; color: var(--text); }
  .history-month-label { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
  .history-all-btn { font-size: 11px; font-family: 'DM Mono', monospace; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: none; cursor: pointer; color: var(--muted); }
  .history-all-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* EDIT BUTTON */
  .tx-edit { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0 4px; transition: color 0.15s; }
  .tx-edit:hover { color: var(--accent); }

  /* EDIT MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: flex-end; justify-content: center; padding: 20px; }
  .modal-box { background: var(--surface); border-radius: 16px 16px 12px 12px; width: 100%; max-width: 600px; padding: 24px; max-height: 85vh; overflow-y: auto; }
  .modal-title { font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); line-height: 1; }

</style>
</head>
<body>
<div class="container">
  <div style="text-align:center;margin-bottom:24px">
    <img src="https://i.imgur.com/aIu6WOT.jpeg" alt="mumu and latte"
         style="width:100%;max-width:480px;border-radius:16px;display:block;margin:0 auto 16px">
    <h1 style="font-family:'DM Mono',monospace;font-size:16px;letter-spacing:0.15em;color:var(--muted);margin:0">mumu latte money</h1>
  </div>

  <!-- ログイン画面 -->
  <div id="login-screen">
    <div class="login-title">kakeibo</div>
    <div class="login-sub">naoki・yumiの家族で使う家計簿です。<br>Googleアカウントでログインしてください。</div>
    <button class="google-btn" id="google-login-btn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Googleでログイン
    </button>
  </div>

  <!-- アプリ本体 -->
  <div id="app" style="display:none">
    <div class="user-bar">
      <div class="user-info">
        <img class="user-avatar-sm" id="user-photo" src="" alt="">
        <span id="user-name"></span>
      </div>
      <button class="logout-btn" id="logout-btn">ログアウト</button>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('record', this)">記録</button>
      <button class="nav-tab" onclick="showPage('chart', this)">グラフ</button>
      <button class="nav-tab" onclick="showPage('history', this)">履歴</button>
      <button class="nav-tab" onclick="showPage('fixed', this)">固定費</button>
    </div>

    <!-- 記録 -->
    <div id="page-record" class="page active">
      <div class="summary">
        <div class="summary-item"><div class="summary-label">今月の収入</div><div class="summary-value income" id="total-income">¥0</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCFBybW0jJD2iPm0-x1FDhH5qbWFBFXeSE",
  authDomain: "kakeibo-cea1a.firebaseapp.com",
  projectId: "kakeibo-cea1a",
  storageBucket: "kakeibo-cea1a.firebasestorage.app",
  messagingSenderId: "629767950385",
  appId: "1:629767950385:web:bef5465fe6e8bf721fc510",
  measurementId: "G-458217LM1C"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let transactions = [];
let fixedItems = [];
let unsubTx = null, unsubFixed = null;

// ===== AUTH =====
window.loginWithGoogle = async () => {
  const provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); }
};
window.logout = async () => {
  if (unsubTx) unsubTx();
  if (unsubFixed) unsubFixed();
  await signOut(auth);
};

// Attach auth buttons via JS (avoids module scope issue with onclick)
document.getElementById('google-login-btn').addEventListener('click', () => window.loginWithGoogle());
document.getElementById('logout-btn').addEventListener('click', () => window.logout());

onAuthStateChanged(auth, (user) => {
  if (!user) {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    return;
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-name').textContent = user.displayName || user.email;
  document.getElementById('user-photo').src = user.photoURL || '';

  if (unsubTx) unsubTx();
  const q = query(collection(db, 'transactions'), orderBy('createdAt', 'desc'));
  unsubTx = onSnapshot(q, (snap) => {
    transactions = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.date||'').localeCompare(b.date||'') || a.createdAt - b.createdAt);
    renderSummary(); renderList(); renderChart();
  });

  if (unsubFixed) unsubFixed();
  const qf = query(collection(db, 'fixedItems'), orderBy('createdAt', 'asc'));
  let fixedLoaded = false;
  unsubFixed = onSnapshot(qf, (snap) => {
    fixedItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderFixedList();
    if (!fixedLoaded) { fixedLoaded = true; autoReflectFixed(); }
  });
});

// ===== CATEGORIES =====
const categories = {
  expense: {
    '外食費':             ['モーニング','ランチ','ディナー','カフェ'],
    '食品/日用品':        ['オンラインストア','オフラインストア','オイシックス/ナッシュ'],
    '娯楽':               ['サービス','製品'],
    '住宅関係':           ['住宅ローン','管理費','修繕積立費','駐輪場使用費'],
    '税金':               ['固定資産税','ふるさと納税'],
    'インフラ関連':       ['電気代','ガス代','水道代','インターネット','NHK','携帯料金','その他'],
    '医療費':             ['治療費','薬代'],
    'mumu/latte':         ['食費','病院関連','アニコム保険','その他mumu/latte'],
    '保険':               ['国民年金','かんぽ生命','メディケア生命','FWD','その他の保険'],
    'サブスクリプション': ['Apple music','iCloud storage','Amazon','Netflix','Adobe','その他'],
    '貯蓄関連':           ['三井生命','かんぽ生命','ジブラルタ生命','NISA','東京海上','ローン積立','固定資産税貯金','自社株投資','旅行貯金'],
    '旅行費用':           ['ホテル代','食事代','交通費','アクティビティ','雑費'],
  },
  income: {
    '給与・賞与': ['給与','ボーナス'],
    '副業・投資': ['副業','配当・利息','売却益'],
    'その他収入': ['還付金','贈与','その他'],
  }
};

const members = ['naoki', 'yumi'];
let currentType = 'expense';
let currentMember = 'naoki';
let currentFixedMember = 'naoki';
let filterType = 'all';
let filterMember = 'all';
const now = new Date();
let chartYear = now.getFullYear();
let chartMonth = now.getMonth();
let chartMemberFilter = 'all';
let historyYear = now.getFullYear();
let historyMonth = now.getMonth();
let historyShowAll = false;
let editingId = null;
let expBreakdownDrill = null;  // null=top, string=catMain drilling
let expBreakdownDrillSub = null; // null or catSub being drilled (level 3)
let editingType = 'expense';
let editingMember = 'naoki';

// ===== UI HELPERS =====
window.showPage = (name, el) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'chart') renderChart();
  if (name === 'history') renderList();
};

window.setType = (type) => {
  currentType = type;
  document.getElementById('btn-income').className = 'type-btn income' + (type === 'income' ? ' active' : '');
  document.getElementById('btn-expense').className = 'type-btn expense' + (type === 'expense' ? ' active' : '');
  updateCategorySelect();
};

window.setMember = (m) => {
  currentMember = m;
  document.getElementById('btn-naoki').className = 'member-btn naoki' + (m === 'naoki' ? ' active' : '');
  document.getElementById('btn-yumi').className = 'member-btn yumi' + (m === 'yumi' ? ' active' : '');
};

window.setFixedMember = (m) => {
  currentFixedMember = m;
  document.getElementById('fbtn-naoki').className = 'member-btn naoki' + (m === 'naoki' ? ' active' : '');
  document.getElementById('fbtn-yumi').className = 'member-btn yumi' + (m === 'yumi' ? ' active' : '');
};

window.setFilter = (axis, val, el) => {
  if (axis === 'type') {
    filterType = val;
    document.querySelectorAll('.filter-tab:not(.naoki-f):not(.yumi-f)').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  } else {
    filterMember = filterMember === val ? 'all' : val;
    document.querySelectorAll('.filter-tab.naoki-f, .filter-tab.yumi-f').forEach(t => t.classList.remove('active'));
    if (filterMember !== 'all') el.classList.add('active');
  }
  renderList();
};

window.setChartMember = (m, el) => {
  chartMemberFilter = m;
  document.querySelectorAll('.chart-member-btn').forEach(b => b.classList.remove('active','all','naoki','yumi'));
  el.classList.add('active', m);
  renderChart();
};

window.changeChartMonth = (delta) => {
  chartMonth += delta;
  if (chartMonth > 11) { chartMonth = 0; chartYear++; }
  if (chartMonth < 0) { chartMonth = 11; chartYear--; }
  renderChart();
};

window.changeHistoryMonth = (delta) => {
  historyMonth += delta;
  if (historyMonth > 11) { historyMonth = 0; historyYear++; }
  if (historyMonth < 0) { historyMonth = 11; historyYear--; }
  historyShowAll = false;
  renderList();
};

function updateCategorySelect() {
  const mainSel = document.getElementById('cat-main');
  if (!mainSel) return;
  const cats = categories[currentType];
  mainSel.innerHTML = Object.keys(cats).map(k => `<option value="${k}">${k}</option>`).join('');
  updateSubCategory();
}

window.updateSubCategory = () => {
  const mainSel = document.getElementById('cat-main');
  const subSel = document.getElementById('cat-sub');
  if (!mainSel || !subSel) return;
  const subs = categories[currentType][mainSel.value] || [];
  subSel.innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join('');
};

function updateFixedCategorySelect() {
  const mainSel = document.getElementById('f-cat-main');
  if (!mainSel) return;
  const cats = categories['expense'];
  mainSel.innerHTML = Object.keys(cats).map(k => `<option value="${k}">${k}</option>`).join('');
  updateFixedSubCategory();
}

window.updateFixedSubCategory = () => {
  const mainSel = document.getElementById('f-cat-main');
  const subSel = document.getElementById('f-cat-sub');
  if (!mainSel || !subSel) return;
  const subs = categories['expense'][mainSel.value] || [];
  subSel.innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join('');
};

function fmt(n) { return '¥' + Math.abs(n).toLocaleString('ja-JP'); }

// ===== TRANSACTIONS =====
window.toggleRepeatInterval = () => {
  const cb = document.getElementById('is-repeat');
  const sel = document.getElementById('repeat-interval');
  sel.style.display = cb.checked ? 'inline-block' : 'none';
};

window.addTransaction = async () => {
  const amount = parseFloat(document.getElementById('amount').value);
  const date = document.getElementById('date').value;
  const catMain = document.getElementById('cat-main').value;
  const catSub = document.getElementById('cat-sub').value;
  const store = document.getElementById('store').value.trim();
  const memo = document.getElementById('memo').value.trim() || catSub;
  const isRepeat = document.getElementById('is-repeat').checked;
  const repeatInterval = isRepeat ? parseInt(document.getElementById('repeat-interval').value) || 1 : 1;
  if (!amount || amount <= 0 || !date) { alert('金額と日付を入力してください。'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    // 取引を記録
    await addDoc(collection(db, 'transactions'), {
      type: currentType, member: currentMember,
      amount, date, memo, catMain, catSub, store,
      isFixed: isRepeat, createdAt: Date.now()
    });
    // 繰り返しチェックがある場合、固定費にも登録
    if (isRepeat && currentType === 'expense') {
      const dateDay = parseInt(date.split('-')[2]) || 1;
      await addDoc(collection(db, 'fixedItems'), {
        member: currentMember, amount, catMain, catSub, memo, day: dateDay, interval: repeatInterval,
        createdAt: Date.now()
      });
    }
    document.getElementById('amount').value = '';
    document.getElementById('memo').value = '';
    document.getElementById('store').value = '';
    document.getElementById('is-repeat').checked = false;
    document.getElementById('repeat-interval').style.display = 'none';
  } catch(e) { alert('保存に失敗しました: ' + e.message); }
  btn.disabled = false; btn.textContent = '追加する';
};

window.deleteTransaction = async (id) => {
  if (!confirm('この記録を削除しますか？')) return;
  try { await deleteDoc(doc(db, 'transactions', id)); } catch(e) { alert('削除に失敗しました'); }
};

// ===== FIXED ITEMS =====
window.toggleFixedForm = () => {
  const f = document.getElementById('fixed-form');
  f.classList.toggle('open');

window.saveFixedItem = async () => {

window.deleteFixedItem = async (id) => {
  const item = fixedItems.find(f => f.id === id);
  const name = item ? item.memo : 'この固定費';
  if (!confirm(`「${name}」の繰り返し設定を削除しますか？\n\n※ 過去の記録はそのまま残ります。\n※ 来月以降は自動で記録されなくなります。`)) return;
  try { await deleteDoc(doc(db, 'fixedItems', id)); } catch(e) { alert('削除に失敗しました'); }
};

async function doReflectFixed(silent) {
  if (!fixedItems.length) { if (!silent) alert('固定費が登録されていません。'); return; }
  const now2 = new Date();
  const y = now2.getFullYear();
  const m = String(now2.getMonth() + 1).padStart(2, '0');
  const monthKey = `${y}-${m}`;
  const alreadyAdded = new Set(
    transactions.filter(t => t.date && t.date.startsWith(monthKey) && t.isFixed).map(t => t.fixedId)
  );
  const nowMonthIndex = now2.getFullYear() * 12 + now2.getMonth();
  const toAdd = fixedItems.filter(f => {
    if (alreadyAdded.has(f.id)) return false;
    const interval = f.interval || 1;
    if (interval === 1) return true;
    const startDate = new Date(f.createdAt || Date.now());
    const startMonthIndex = startDate.getFullYear() * 12 + startDate.getMonth();
    return (nowMonthIndex - startMonthIndex) % interval === 0;
  });
  if (!toAdd.length) { if (!silent) alert('今月分はすでに反映済みです。'); return; }
  if (!silent && !confirm(`${toAdd.length}件の固定費を今月分として記録しますか？`)) return;
  for (const f of toAdd) {
    const day = String(Math.min(f.day || 1, 28)).padStart(2, '0');
    const date = `${monthKey}-${day}`;
    await addDoc(collection(db, 'transactions'), {
      type: 'expense', member: f.member,
      amount: f.amount, date, memo: f.memo,
      catMain: f.catMain, catSub: f.catSub, store: '',
      isFixed: true, fixedId: f.id, createdAt: Date.now()
    });
  }
  if (!silent) alert(`${toAdd.length}件を反映しました！`);
}
async function autoReflectFixed() { await doReflectFixed(true); }
window.reflectFixedThisMonth = async () => { await doReflectFixed(false); };

window.openEditModal = (id) => {
  const t = transactions.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  editingType = t.type;
  editingMember = t.member || 'naoki';

  // populate member
  setEditMember(editingMember);
  setEditType(editingType);

  // populate category
  const mainSel = document.getElementById('edit-cat-main');
  const cats = categories[editingType];
  mainSel.innerHTML = Object.keys(cats).map(k => `<option value="${k}">${k}</option>`).join('');
  if (t.catMain) mainSel.value = t.catMain;
  updateEditSubCategory();
  const subSel = document.getElementById('edit-cat-sub');
  if (t.catSub) subSel.value = t.catSub;

  document.getElementById('edit-amount').value = t.amount || '';
  document.getElementById('edit-date').value = t.date || '';
  document.getElementById('edit-store').value = t.store || '';
  document.getElementById('edit-memo').value = t.memo || '';

  document.getElementById('edit-modal').style.display = 'flex';
};

window.saveEdit = async () => {
  if (!editingId) return;
  const amount = parseFloat(document.getElementById('edit-amount').value);
  const date = document.getElementById('edit-date').value;
  const catMain = document.getElementById('edit-cat-main').value;

    await updateDoc(doc(db, 'transactions', editingId), {

function memberTotals(m) {
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  const tx = (m === 'all' ? transactions : transactions.filter(t => t.member === m))
    .filter(t => t.date && t.date.startsWith(thisMonth));
  const inc = tx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const exp = tx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  return { inc, exp, bal: inc - exp };
}

function renderSummary() {
  const all = memberTotals('all');
  document.getElementById('total-income').textContent = fmt(all.inc);
  document.getElementById('total-expense').textContent = fmt(all.exp);
  const balEl = document.getElementById('total-balance');
  balEl.textContent = (all.bal < 0 ? '-' : '') + fmt(all.bal);
  balEl.style.color = all.bal < 0 ? 'var(--expense)' : 'var(--text)';
  members.forEach(m => {
    const t = memberTotals(m);
    document.getElementById(`${m}-income`).textContent = fmt(t.inc);
    document.getElementById(`${m}-expense`).textContent = fmt(t.exp);
    const bEl = document.getElementById(`${m}-balance`);
    bEl.textContent = (t.bal < 0 ? '-' : '') + fmt(t.bal);
    bEl.style.color = t.bal < 0 ? 'var(--expense)' : 'var(--text)';
  });
}

function getMonthKey(y, m) { return `${y}-${String(m + 1).padStart(2, '0')}`; }
function getTxForMonth(y, m, member) {
  const key = getMonthKey(y, m);
  let tx = transactions.filter(t => t.date && t.date.startsWith(key));
  if (member !== 'all') tx = tx.filter(t => t.member === member);
  return tx;
}

function renderChart() {
  const mf = chartMemberFilter;
  const mlEl = document.getElementById('chart-month-label');
  if (!mlEl) return;
  mlEl.textContent = `${chartYear}年${chartMonth + 1}月`;

  const monthTx = getTxForMonth(chartYear, chartMonth, mf);
  const inc = monthTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const exp = monthTx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const bal = inc - exp;
  const ratio = inc > 0 ? Math.round((exp / inc) * 100) : 0;

  document.getElementById('chart-income').textContent = fmt(inc);
  document.getElementById('chart-expense').textContent = fmt(exp);
  const balEl = document.getElementById('chart-balance');
  balEl.textContent = (bal < 0 ? '-' : '+') + fmt(bal);
  balEl.style.color = bal < 0 ? 'var(--expense)' : 'var(--income)';
  const ratioEl = document.getElementById('chart-ratio');
  ratioEl.textContent = inc > 0 ? ratio + '%' : '-%';
  ratioEl.style.color = ratio > 80 ? 'var(--expense)' : ratio > 60 ? '#e67e22' : 'var(--income)';

  // 6-month data
  const months = [];
  for (let i = 5; i >= 0; i--) {
    let y = chartYear, m = chartMonth - i;
    while (m < 0) { m += 12; y--; }
    const txs = getTxForMonth(y, m, mf);
    const mi = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const me = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    months.push({ label: `${m + 1}月`, income: mi, expense: me, diff: mi - me });
  }

  // Helper: render a single-metric bar chart
  function renderSingleBarChart(elId, values, colorClass, isSigned) {
    const el = document.getElementById(elId);
    if (!el) return;
    const maxAbs = Math.max(...values.map(v => Math.abs(v)), 1);
    el.innerHTML = values.map((v, i) => {
      const h = Math.max(Math.round((Math.abs(v) / maxAbs) * 100), v !== 0 ? 2 : 0);
      const cls = isSigned ? (v >= 0 ? 'diff-pos' : 'diff-neg') : colorClass;
      const label = v !== 0 ? (v >= 1000 ? (v/10000).toFixed(1)+'万' : v.toLocaleString()) : '';
      return `<div class="bar-group">
        <div class="bar-val">${label}</div>
        <div class="bar-pair"><div class="bar ${cls}" style="height:${h}%"></div></div>
        <div class="bar-month">${months[i].label}</div>
      </div>`;
    }).join('');
  }

  renderSingleBarChart('bar-chart-expense', months.map(m => m.expense), 'expense', false);
  renderSingleBarChart('bar-chart-income', months.map(m => m.income), 'income', false);
  renderSingleBarChart('bar-chart-diff', months.map(m => m.diff), '', true);

  // Member split
  const splitCard = document.getElementById('member-split-card');
  if (mf === 'all') {
    splitCard.style.display = 'block';
    const ne = getTxForMonth(chartYear, chartMonth, 'naoki').filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const ye = getTxForMonth(chartYear, chartMonth, 'yumi').filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const tot = ne + ye || 1;
    document.getElementById('member-split').innerHTML = `
      <div class="member-bar-row"><div class="member-bar-label" style="color:var(--naoki)">naoki</div><div class="member-bar-track"><div class="member-bar-fill naoki" style="width:${Math.round(ne/tot*100)}%"></div></div><div class="member-bar-val">${fmt(ne)}</div></div>
      <div class="member-bar-row"><div class="member-bar-label" style="color:var(--yumi)">yumi</div><div class="member-bar-track"><div class="member-bar-fill yumi" style="width:${Math.round(ye/tot*100)}%"></div></div><div class="member-bar-val">${fmt(ye)}</div></div>`;
  } else { splitCard.style.display = 'none'; }

  // Category breakdown with member split
  expBreakdownDrill = null;
  renderCategoryBreakdown('expense-breakdown', monthTx, 'expense', exp, mf);
  renderIncomeBreakdown('income-breakdown', monthTx, 'income', inc);
}

// Store last monthTx/mf for drill-down re-render
let _lastMonthTx = [], _lastMf = 'all', _lastExp = 0;

function safeAttr(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function renderCategoryBreakdown(elId, monthTx, type, total, mf) {
  _lastMonthTx = monthTx; _lastMf = mf; _lastExp = total;
  const el = document.getElementById(elId);
  const pathEl = document.getElementById('expense-breakdown-path');

  // ── LEVEL 3: individual transactions ──────────────────────────────────
  if (expBreakdownDrill && expBreakdownDrillSub !== null) {
    if (pathEl) { pathEl.style.display = 'block'; pathEl.textContent = `${expBreakdownDrill} › ${expBreakdownDrillSub}`; }
    const txList = monthTx.filter(t =>
      t.type === type &&
      (t.catMain || t.category) === expBreakdownDrill &&
      (t.catSub || t.memo || 'その他') === expBreakdownDrillSub
    ).sort((a, b) => (a.date||'').localeCompare(b.date||''));

    if (!txList.length) { el.innerHTML = '<button class="cat-back-btn" onclick="drillBackToSub()">‹ 戻る</button><div style="font-size:13px;color:var(--muted);text-align:center;padding:12px 0">記録なし</div>'; return; }

    el.innerHTML = '<button class="cat-back-btn" onclick="drillBackToSub()">‹ 戻る</button>'
      + '<div class="transaction-list" style="border:1px solid var(--border);border-radius:10px;overflow:hidden">'
      + txList.map(t => `
        <div class="transaction" style="background:var(--surface);padding:12px 16px">
          <div class="tx-avatar ${t.member}">${t.member === 'naoki' ? 'Na' : 'Yu'}</div>
          <div class="tx-info" style="flex:1;min-width:0">
            <div class="tx-desc" style="font-size:13px">${t.memo}${t.isFixed ? ' <span style="font-size:9px;background:#e8f4ed;color:var(--income);padding:1px 5px;border-radius:3px">固定</span>' : ''}</div>
            <div class="tx-meta">${t.date}${t.store ? ' · ' + t.store : ''}</div>
          </div>
          <div class="tx-amount ${t.type}" style="font-size:13px">-${fmt(t.amount)}</div>
          <button class="tx-edit" onclick="openEditModal('${safeAttr(t.id)}')">✎</button>
          <button class="tx-delete" onclick="deleteTransaction('${safeAttr(t.id)}')">×</button>
        </div>`).join('')
      + '</div>';
    return;
  }

  // ── LEVEL 2: catSub breakdown ─────────────────────────────────────────
  if (expBreakdownDrill) {
    if (pathEl) { pathEl.style.display = 'block'; pathEl.textContent = expBreakdownDrill; }
    const subData = {};
    monthTx.filter(t => t.type === type && (t.catMain || t.category) === expBreakdownDrill).forEach(t => {
      const k = t.catSub || t.memo || 'その他';
      if (!subData[k]) subData[k] = { total: 0, naoki: 0, yumi: 0 };
      subData[k].total += t.amount;
      subData[k][t.member] = (subData[k][t.member] || 0) + t.amount;
    });
    const drillTotal = Object.values(subData).reduce((s, v) => s + v.total, 0);
    const entries = Object.entries(subData).sort((a, b) => b[1].total - a[1].total);
    if (!entries.length) { el.innerHTML = '<button class="cat-back-btn" onclick="drillBack()">‹ 戻る</button><div style="font-size:13px;color:var(--muted);text-align:center;padding:12px 0">記録なし</div>'; return; }

    el.innerHTML = `<button class="cat-back-btn" onclick="drillBack()">‹ 戻る</button>` +
      entries.map(([sub, data]) => {
        const pct = drillTotal > 0 ? Math.round((data.total / drillTotal) * 100) : 0;
        const showMemberBars = mf === 'all' && (data.naoki > 0 || data.yumi > 0);
        const naokiPct = data.total > 0 ? Math.round((data.naoki / data.total) * 100) : 0;
        const yumiPct  = data.total > 0 ? Math.round((data.yumi  / data.total) * 100) : 0;
        return `<div class="cat-item clickable" onclick="drillIntoSub('${safeAttr(sub)}')">
          <div class="cat-row">
            <span class="cat-name">${sub} <span style="font-size:10px;color:var(--muted)">›</span></span>
            <span class="cat-amount">${fmt(data.total)} <span style="color:var(--muted);font-size:10px">${pct}%</span></span>
          </div>
          ${showMemberBars ? `<div class="cat-member-bars">
            ${data.naoki > 0 ? `<div class="cat-member-row"><div class="cat-member-label naoki">naoki</div><div class="cat-bar-track"><div class="cat-bar-fill naoki" style="width:${naokiPct}%"></div></div><div class="cat-member-val">${fmt(data.naoki)}</div></div>` : ''}
            ${data.yumi  > 0 ? `<div class="cat-member-row"><div class="cat-member-label yumi">yumi</div><div class="cat-bar-track"><div class="cat-bar-fill yumi" style="width:${yumiPct}%"></div></div><div class="cat-member-val">${fmt(data.yumi)}</div></div>` : ''}
          </div>` : `<div class="cat-bar-track"><div class="cat-bar-fill ${type}" style="width:${pct}%"></div></div>`}
        </div>`;
      }).join('');
    return;
  }

  // ── LEVEL 1: top-level catMain ────────────────────────────────────────
  if (pathEl) pathEl.style.display = 'none';
  const catData = {};
  monthTx.filter(t => t.type === type).forEach(t => {
    const k = t.catMain || t.category || 'その他';
    if (!catData[k]) catData[k] = { total: 0, naoki: 0, yumi: 0 };
    catData[k].total += t.amount;
    catData[k][t.member] = (catData[k][t.member] || 0) + t.amount;
  });

  const entries = Object.entries(catData).sort((a, b) => b[1].total - a[1].total);
  if (!entries.length) { el.innerHTML = '<div style="font-size:13px;color:var(--muted);text-align:center;padding:12px 0">記録なし</div>'; return; }

  el.innerHTML = entries.map(([cat, data]) => {
    const pct = total > 0 ? Math.round((data.total / total) * 100) : 0;
    const naokiPct = data.total > 0 ? Math.round((data.naoki / data.total) * 100) : 0;
    const yumiPct  = data.total > 0 ? Math.round((data.yumi  / data.total) * 100) : 0;
    const showMemberBars = mf === 'all' && (data.naoki > 0 || data.yumi > 0);
    return `<div class="cat-item clickable" onclick="drillInto('${safeAttr(cat)}')">
      <div class="cat-row">
        <span class="cat-name">${cat} <span style="font-size:10px;color:var(--muted)">›</span></span>
        <span class="cat-amount">${fmt(data.total)} <span style="color:var(--muted);font-size:10px">${pct}%</span></span>
      </div>
      ${showMemberBars ? `<div class="cat-member-bars">
        ${data.naoki > 0 ? `<div class="cat-member-row"><div class="cat-member-label naoki">naoki</div><div class="cat-bar-track"><div class="cat-bar-fill naoki" style="width:${naokiPct}%"></div></div><div class="cat-member-val">${fmt(data.naoki)}</div></div>` : ''}
        ${data.yumi  > 0 ? `<div class="cat-member-row"><div class="cat-member-label yumi">yumi</div><div class="cat-bar-track"><div class="cat-bar-fill yumi" style="width:${yumiPct}%"></div></div><div class="cat-member-val">${fmt(data.yumi)}</div></div>` : ''}
      </div>` : `<div class="cat-bar-track"><div class="cat-bar-fill ${type}" style="width:${pct}%"></div></div>`}
    </div>`;
  }).join('');
}

window.drillInto = (cat) => {
  expBreakdownDrill = cat;
  expBreakdownDrillSub = null;
  renderCategoryBreakdown('expense-breakdown', _lastMonthTx, 'expense', _lastExp, _lastMf);
};
window.drillIntoSub = (sub) => {
  expBreakdownDrillSub = sub;
  renderCategoryBreakdown('expense-breakdown', _lastMonthTx, 'expense', _lastExp, _lastMf);
};
window.drillBack = () => {
  expBreakdownDrill = null;
  expBreakdownDrillSub = null;
  renderCategoryBreakdown('expense-breakdown', _lastMonthTx, 'expense', _lastExp, _lastMf);
};
window.drillBackToSub = () => {
  expBreakdownDrillSub = null;
  renderCategoryBreakdown('expense-breakdown', _lastMonthTx, 'expense', _lastExp, _lastMf);
};

function renderIncomeBreakdown(elId, monthTx, type, total) {
  const el = document.getElementById(elId);
  const data = {};
  monthTx.filter(t => t.type === type).forEach(t => {
    const k = t.catMain || t.category || 'その他';
    data[k] = (data[k] || 0) + t.amount;
  });
  const entries = Object.entries(data).sort((a, b) => b[1] - a[1]);
  if (!entries.length) { el.innerHTML = '<div style="font-size:13px;color:var(--muted);text-align:center;padding:12px 0">記録なし</div>'; return; }
  el.innerHTML = entries.map(([cat, amt]) => {
    const pct = total > 0 ? Math.round((amt / total) * 100) : 0;
    return `<div class="cat-item"><div class="cat-row"><span class="cat-name">${cat}</span><span class="cat-amount">${fmt(amt)} <span style="color:var(--muted);font-size:10px">${pct}%</span></span></div><div class="cat-bar-track"><div class="cat-bar-fill income" style="width:${pct}%"></div></div></div>`;
  }).join('');
}

// Init
document.getElementById('date').valueAsDate = new Date();
updateCategorySelect();
</script>
